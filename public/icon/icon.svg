        fill="#FDE68A"/>

  <!-- Sparkle small top -->
  <path d="M78 20 L79.5 23.5 L83 25 L79.5 26.5 L78 30 L76.5 26.5 L73 25 L76.5 23.5Z"
        fill="#FDE68A" opacity="0.7"/>

  <!-- Sparkle small right -->
